<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <title>HTML Tables</title>
    <link rel="stylesheet" href="{% static 'main.css' %}">
</head>
<body>
    <h1>HTML Tables Example</h1>
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>John</td>
            <td>25</td>
            <td>New York</td>
        </tr>
        <tr>
            <td>Sarah</td>
            <td>30</td>
            <td>London</td>
        </tr>
        <tr>
            <td>Ahmed</td>
            <td>22</td>
            <td>Dubai</td>
        </tr>
    </table>
</body>
</html>
